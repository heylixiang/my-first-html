<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex布局</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background-color: #eee;
        }
        .yingying{
            box-shadow:rgb(0 0 0 / 20%) 0px 2px 1px -1px,
            rgb(0 0 0 / 14%) 0px 1px 1px 0px, rgb(0 0 0 / 12%) 0px 1px 3px 0px;
        }


        
        
        
        .flex{
            display: flex;

             
        }
        .baiSe{
            background-color: rgba(247, 247, 247, 0.97);
        }
        .flex1{
            flex: 1;
        }
        .column{
            flex-direction: column;
        }
        .mg8{
            margin:8px;
        }
        .mgr8{
            margin-right: 8px;
        }
        .mgt8{
            margin-top: 8px;
        }
        .daohang{
            font-weight: bold;
            padding: 10px 20px;
            border-bottom: 1px solid #999;
            font-size: 14 px
            color #57eef6;
        }
    </style>    
</head>
<body class="flex">
    <!-- 侧边栏-->
    <div style="width: 200px;z-index: 2;" class="baiSe yingying">
        <!--头像栏-->
        <div
        style="
         padding:10px;
         align-items: center;
         justify-content: center;
         border-bottom: 1px solid #999;
         " 
         class="flex"
         >
            
            <img 
            src="豆包.jpg" alt="头像" width="40" height="40" >
            <div style="margin-left: 10px;">豆包</div>
        </div> 
        <!-- 导航栏-->
         <div class="flex1">
            <div class="daohang">主页</div>
            <div class="daohang ">消息</div>
            <div class="daohang">设置</div> 
            <div class="daohang">退出</div>
         </div>
    </div>
    <!-- 主体内容-->
    <div class="flex1 flex column">
      <!--头部栏-->
      <div style="height: 60px; z-index:1;" class="baiSe yingying"></div>
      <!--内容区-->
      <div style="overflow: auto;" class="flex flex1">
        <!--左区-->
        <div style="flex: 3;"class="flex column mg8" >
          <!--数据区-->
          <div class="flex">
            <!--数据块-->
            <div style="height: 100px;" class="flex1 baiSe yingying mgr8"></div>
            <div style="height: 100px;" class="flex1 baiSe yingying mgr8"></div>
            <div style="height: 100px;" class="flex1 baiSe yingying mgr8"></div>
          </div>
          <!--列表区-->
          <div class="flex column">
            <!--列表项-->
            <div style="height: 160px;" class="baiSe yingying  mgt8"></div>
            <div style="height: 160px;" class="baiSe yingying mgt8"></div>
            <div style="height: 160px;" class="baiSe yingying mgt8"></div>
            <div style="height: 160px;" class="baiSe yingying mgt8"></div>
            <div style="height: 160px;" class="baiSe yingying mgt8"></div>
          </div>
        </div>
          <!--右区-->
        <div style="flex: 1;"class="flex column mgr8 mgt8" >
          <!--提示区-->
          <div style="height:150px;" class="baiSe yingying"></div>
          <!--消息区-->
          <div style="height:300px;" class="baiSe yingying mgt8"></div>
        </div>
      </div>
    </div>  
</body>
</html>
